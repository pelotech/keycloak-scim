name: Release

# Single workflow that runs release-please and publishes a container image
# from the same job. Triggered on every push to main:
#
#   * If release-please's PR was just merged (release_created=true), the
#     image is tagged with the new SemVer (e.g. 1.0.0-rc.1).
#   * Otherwise, the image is tagged git-<short_sha> — every commit on
#     main is fetchable by SHA.
#
# Keeping release-please and the image build in one job sidesteps GitHub's
# anti-recursion rule (tags pushed by GITHUB_TOKEN don't trigger other
# workflows). No PAT or GitHub App token needed.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_override:
        description: "Image tag to publish (e.g. test-build, 1.0.0-rc.2). Skips release-please's version detection."
        required: false
        type: string

permissions:
  contents: write       # release-please commits + tags
  packages: write       # push to ghcr.io
  pull-requests: write  # release-please opens / updates the release PR
  id-token: write       # cosign keyless signing via GitHub OIDC
  attestations: write   # SBOM attestations

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/pelotech/keycloak-scim

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so SOURCE_DATE_EPOCH = commit time

      - name: release-please
        id: release
        uses: googleapis/release-please-action@v4
        # On workflow_dispatch we skip release-please entirely — the
        # operator is dictating the image tag via version_override and
        # doesn't want a release PR / tag side-effect for an ad-hoc build.
        if: github.event_name != 'workflow_dispatch'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Compute image tag
        id: version
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.version_override }}" ]]; then
            TAG="${{ inputs.version_override }}"
          elif [[ "${{ steps.release.outputs.release_created }}" == "true" ]]; then
            TAG="${{ steps.release.outputs.version }}"
          else
            TAG="git-$(git rev-parse --short HEAD)"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          # Reproducible-build timestamp: the commit being built.
          SDE=$(git log -1 --format=%ct "${GITHUB_SHA}")
          echo "source_date_epoch=${SDE}" >> "$GITHUB_OUTPUT"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build shaded JAR + stage Docker context
        run: ./gradlew prepareDockerContext --no-daemon

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (multi-arch, reproducible)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.version.outputs.tag }}
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ steps.version.outputs.tag }}
            REVISION=${{ github.sha }}
            SOURCE=https://github.com/${{ github.repository }}
          # Determinism: pin layer mtimes to the commit timestamp.
          # Combined with the Gradle reproducible-archives config, this
          # makes the image manifest digest stable across re-runs of the
          # same source revision.
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=false,name-canonical=true
        env:
          SOURCE_DATE_EPOCH: ${{ steps.version.outputs.source_date_epoch }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless, GitHub OIDC)
        env:
          COSIGN_EXPERIMENTAL: "true"
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          # Sign the manifest digest, not the tag — tags are mutable.
          cosign sign --yes "${{ env.IMAGE }}@${DIGEST}"

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (SPDX + CycloneDX JSON)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          syft "${{ env.IMAGE }}@${DIGEST}" \
            -o spdx-json=sbom.spdx.json \
            -o cyclonedx-json=sbom.cyclonedx.json

      - name: Attach SBOM as cosign attestation
        env:
          COSIGN_EXPERIMENTAL: "true"
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${{ env.IMAGE }}@${DIGEST}"

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ steps.version.outputs.tag }}
          path: sbom.*.json
          retention-days: 90
