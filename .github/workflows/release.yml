name: Release container image

# Triggers:
#   * push of a SemVer tag (v*) — release-please creates these when its
#     release PR merges.
#   * workflow_dispatch — manual trigger for testing the build path before
#     release-please is wired up, or for ad-hoc rebuilds.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version_override:
        description: "Version to label the image with (defaults to source build.gradle.kts)"
        required: false
        type: string

permissions:
  contents: read
  packages: write       # push to ghcr.io
  id-token: write       # cosign keyless signing via GitHub OIDC
  attestations: write   # SBOM attestations

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/pelotech/keycloak-scim

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so SOURCE_DATE_EPOCH is the commit ts

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build shaded JAR + stage Docker context
        run: ./gradlew prepareDockerContext --no-daemon

      - name: Compute build metadata
        id: meta
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ inputs.version_override }}" ]]; then
            VERSION="${{ inputs.version_override }}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "revision=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          # Reproducible-build timestamp: tag's commit time, falling back
          # to HEAD's commit time on workflow_dispatch.
          SDE=$(git log -1 --format=%ct "${GITHUB_SHA}")
          echo "source_date_epoch=${SDE}" >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        id: tags
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          # On a tag push, also tag major.minor and latest. On manual
          # dispatch, only the explicit version (no 'latest' aliasing).
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            MAJOR_MINOR="${VERSION%.*}"
            {
              echo "tags<<EOF"
              echo "${{ env.IMAGE }}:${VERSION}"
              echo "${{ env.IMAGE }}:${MAJOR_MINOR}"
              echo "${{ env.IMAGE }}:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "tags=${{ env.IMAGE }}:${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (multi-arch, reproducible)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            REVISION=${{ steps.meta.outputs.revision }}
            SOURCE=https://github.com/${{ github.repository }}
          # Determinism: pin layer mtimes to the commit timestamp.
          # Combined with the Gradle reproducible-archives config, this
          # makes the image manifest digest stable across re-runs of the
          # same source revision.
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=false,name-canonical=true
        env:
          SOURCE_DATE_EPOCH: ${{ steps.meta.outputs.source_date_epoch }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless, GitHub OIDC)
        env:
          COSIGN_EXPERIMENTAL: "true"
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          # Sign the manifest digest, not the tag — tags are mutable.
          cosign sign --yes "${{ env.IMAGE }}@${DIGEST}"

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (SPDX JSON)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          syft "${{ env.IMAGE }}@${DIGEST}" \
            -o spdx-json=sbom.spdx.json \
            -o cyclonedx-json=sbom.cyclonedx.json

      - name: Attach SBOM as cosign attestation
        env:
          COSIGN_EXPERIMENTAL: "true"
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${{ env.IMAGE }}@${DIGEST}"

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ steps.meta.outputs.version }}
          path: sbom.*.json
          retention-days: 90
