version: "3"

services:
  postgres:
    image: postgres@sha256:224f53426f190151cb02b03db1499b999e06025c71b6e73b021b0c83c608ecad
    volumes:
      - db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - 5432:5432
  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    command: start-dev
    volumes:
      # Mounts the staged shaded JAR (./gradlew prepareDockerContext).
      # Stable, version-less path so this file doesn't need to track
      # release-please version bumps.
      - ./build/docker/keycloak-scim.jar:/opt/keycloak/providers/keycloak-scim.jar
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - 127.0.0.1:8080:8080
    depends_on:
      - postgres

volumes:
  db:
